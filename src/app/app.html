@if (showLayout()) {
  <!-- Layout normal con Header y Sidebar -->
  <div class="app-container">
    <app-header />
    <div class="app-body">
      <app-sidebar />
      <main class="main-content" [@fadeScaleAnimation]="getRouteAnimationData()">
        <router-outlet />
      </main>
    </div>
  </div>
} @else {
  <!-- Layout sin Header/Sidebar (para auth) -->
  <div [@fadeScaleAnimation]="getRouteAnimationData()">
    <router-outlet />
  </div>
}

<!-- Dialog de perfil a nivel global -->
<app-profile-edit-dialog />
